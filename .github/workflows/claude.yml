# Claude Code GitHub Action — responds to @claude mentions in issues and PRs. This is the live
# artifact behind the `ci` version-data key (R12/U16 dogfood). Authored from the official
# anthropics/claude-code-action examples/claude.yml, verified against
# code.claude.com/docs/en/github-actions (2026-06-02). Action pinned to @v1 (GA).
#
# GitHub-only guard: this Action is a github.com integration — it needs the Claude GitHub App
# and the ANTHROPIC_API_KEY secret, which live only on the GitHub remote. `origin` here is the
# Gitea mirror (gitea.marlow.home); the `github.server_url == 'https://github.com'` clause in
# the job `if:` makes the job a no-op (skipped, not failed) anywhere that isn't github.com, so
# the file is inert on Gitea even though it ships to both remotes.
#
# Manual setup still required (repo-admin only, one time): install the Claude GitHub App
# (https://github.com/apps/claude or `/install-github-app`) and add the CLAUDE_CODE_OAUTH_TOKEN
# secret (generated locally with `claude setup-token`; uses a Claude Pro/Max subscription instead
# of a metered API key). Test by commenting `@claude ...` on an issue or PR.
name: Claude Code

on:
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]
  issues:
    types: [opened, assigned]
  pull_request_review:
    types: [submitted]

jobs:
  claude:
    # Run only on github.com (skip on the Gitea mirror) AND only when the triggering
    # comment / issue / review body or title actually mentions @claude.
    if: |
      github.server_url == 'https://github.com' && (
        (github.event_name == 'issue_comment' && contains(github.event.comment.body, '@claude')) ||
        (github.event_name == 'pull_request_review_comment' && contains(github.event.comment.body, '@claude')) ||
        (github.event_name == 'pull_request_review' && contains(github.event.review.body, '@claude')) ||
        (github.event_name == 'issues' && (contains(github.event.issue.body, '@claude') || contains(github.event.issue.title, '@claude')))
      )
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      issues: write
      id-token: write
      actions: read # Required for Claude to read CI results on PRs
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 1

      - name: Run Claude Code
        id: claude
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
