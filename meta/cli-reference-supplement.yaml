# CLI-reference supplement — the hand-authored half of the exhaustive CLI reference (R16.AC4).
#
# `claude --help` (recursively introspected into meta/cli-reference.json) covers launch-time flags
# and subcommands, but NOT the in-REPL slash commands or output styles — those are documented, not
# surfaced by --help. This file supplies that doc-only surface so the reference is exhaustive.
#
# HARD RULE (R12.AC3), mirroring meta/version-data.yaml: nothing here is authored from model
# memory. Every section cites an official-docs URL + retrieval date as its `provenance`; entries
# inherit the section's provenance unless they set their own. Descriptions are faithful
# condensations of the cited page. Anything not confirmable from the cited doc is marked
# `unverified: true`. The generator stamps `source: supplement` on every entry.
#
# Maintenance: on a version refresh (R12.AC7), re-fetch the cited pages, update entries + the
# retrieval date, and regenerate via `tools/render-cli-reference --all`.

schema_version: 1

sections:
  - title: "In-REPL slash commands"
    provenance: "https://code.claude.com/docs/en/commands (retrieved 2026-05-31)"
    note: >-
      Type `/` in a session to see the commands available to you; availability varies by platform,
      plan, and environment. MCP servers can expose prompts as `/mcp__<server>__<prompt>` commands,
      discovered dynamically from connected servers. Entries marked "(bundled skill)" / "(bundled
      workflow)" are prompts Claude can also invoke automatically. Excludes `/vim` (removed v2.1.92)
      and `/pr-comments` (removed v2.1.91), which are absent from the installed CLI.
    entries:
      - name: "/add-dir <path>"
        description: "Add a working directory for file access during the current session."
      - name: "/agents"
        description: "Manage agent (subagent) configurations."
      - name: "/autofix-pr [prompt]"
        description: "Spawn a Claude Code on the web session that watches the current branch's PR and pushes fixes when CI fails or reviewers comment. Requires the gh CLI."
      - name: "/background [prompt]"
        description: "Detach the current session to run as a background agent and free the terminal. Alias: /bg."
      - name: "/batch <instruction>"
        description: "(bundled skill) Orchestrate large-scale changes in parallel: decompose into 5–30 units, one background subagent per git worktree. Requires a git repository."
      - name: "/branch [name]"
        description: "Create a branch of the current conversation at this point, preserving the original. Alias: /fork."
      - name: "/btw <question>"
        description: "Ask a quick side question without adding to the conversation."
      - name: "/chrome"
        description: "Configure Claude in Chrome settings."
      - name: "/claude-api [migrate|managed-agents-onboard]"
        description: "(bundled skill) Load Claude API reference material for your project's language; migrate API code to a newer model, or onboard a Managed Agent."
      - name: "/clear [name]"
        description: "Start a new conversation with empty context; the previous one stays in /resume. Aliases: /reset, /new."
      - name: "/code-review [low|medium|high|xhigh|max|ultra] [--fix] [--comment] [target]"
        description: "(bundled skill) Review the current diff for bugs and cleanups; --fix applies findings, --comment posts PR comments, ultra runs a cloud review."
      - name: "/color [color|default]"
        description: "Set the prompt-bar color for the current session."
      - name: "/compact [instructions]"
        description: "Free up context by summarizing the conversation so far; optional focus instructions."
      - name: "/config"
        description: "Open the Settings interface (theme, model, output style, and other preferences). Alias: /settings."
      - name: "/context [all]"
        description: "Visualize current context usage as a colored grid with optimization suggestions."
      - name: "/copy [N]"
        description: "Copy the last assistant response (or the Nth-latest) to the clipboard."
      - name: "/cost"
        description: "Alias for /usage."
      - name: "/debug [description]"
        description: "(bundled skill) Enable debug logging and troubleshoot by reading the session debug log."
      - name: "/deep-research <question>"
        description: "(bundled workflow) Fan out web searches, fetch and cross-check sources, and synthesize a cited report."
      - name: "/desktop"
        description: "Continue the current session in the Claude Code Desktop app (macOS/Windows, subscription). Alias: /app."
      - name: "/diff"
        description: "Open an interactive diff viewer showing uncommitted changes and per-turn diffs."
      - name: "/doctor"
        description: "Diagnose and verify your Claude Code installation and settings."
      - name: "/effort [level|auto]"
        description: "Set the model effort level (low/medium/high/xhigh/max/ultracode); auto resets to the model default."
      - name: "/exit"
        description: "Exit the CLI (detaches an attached background session). Alias: /quit."
      - name: "/export [filename]"
        description: "Export the current conversation as plain text."
      - name: "/fast [on|off]"
        description: "Toggle fast mode on or off."
      - name: "/feedback [report]"
        description: "Submit feedback, report a bug, or share your conversation. Aliases: /bug, /share."
      - name: "/fewer-permission-prompts"
        description: "(bundled skill) Scan transcripts for common read-only calls and add an allowlist to project settings."
      - name: "/focus"
        description: "Toggle the focus view (last prompt, tool-call summary, final response). Fullscreen only."
      - name: "/goal [condition|clear]"
        description: "Set a goal Claude keeps working toward across turns until met; clear removes it."
      - name: "/heapdump"
        description: "Write a JS heap snapshot and memory breakdown for diagnosing high memory usage."
      - name: "/help"
        description: "Show help and available commands."
      - name: "/hooks"
        description: "View hook configurations for tool events."
      - name: "/ide"
        description: "Manage IDE integrations and show status."
      - name: "/init"
        description: "Initialize the project with a CLAUDE.md guide."
      - name: "/insights"
        description: "Generate a report analyzing your Claude Code sessions."
      - name: "/install-github-app"
        description: "Set up the Claude GitHub Actions app for a repository."
      - name: "/install-slack-app"
        description: "Install the Claude Slack app via the OAuth flow."
      - name: "/keybindings"
        description: "Open or create your keybindings configuration file."
      - name: "/login"
        description: "Sign in to your Anthropic account."
      - name: "/logout"
        description: "Sign out from your Anthropic account."
      - name: "/loop [interval] [prompt]"
        description: "(bundled skill) Run a prompt repeatedly while the session stays open; omit the interval to self-pace. Alias: /proactive."
      - name: "/mcp"
        description: "Manage MCP server connections and OAuth authentication."
      - name: "/memory"
        description: "Edit CLAUDE.md memory files; enable/disable and view auto-memory entries."
      - name: "/mobile"
        description: "Show a QR code to download the Claude mobile app. Aliases: /ios, /android."
      - name: "/model [model]"
        description: "Switch the AI model and save it as the default for new sessions."
      - name: "/passes"
        description: "Share a free week of Claude Code with friends (only if eligible)."
      - name: "/permissions"
        description: "Manage allow/ask/deny rules for tool permissions. Alias: /allowed-tools."
      - name: "/plan [description]"
        description: "Enter plan mode directly from the prompt."
      - name: "/plugin"
        description: "Manage Claude Code plugins."
      - name: "/powerup"
        description: "Discover Claude Code features through quick interactive lessons."
      - name: "/privacy-settings"
        description: "View and update your privacy settings (Pro/Max)."
      - name: "/radio"
        description: "Open Claude FM lo-fi radio in your browser."
      - name: "/recap"
        description: "Generate a one-line summary of the current session on demand."
      - name: "/release-notes"
        description: "View the changelog in an interactive version picker."
      - name: "/reload-plugins"
        description: "Reload active plugins to apply pending changes without restarting."
      - name: "/reload-skills"
        description: "Re-scan skill and command directories so on-disk changes apply without restarting."
      - name: "/remote-control"
        description: "Make this session available for remote control from claude.ai. Alias: /rc."
      - name: "/remote-env"
        description: "Configure the default remote environment for web sessions."
      - name: "/rename [name]"
        description: "Rename the current session and show the name on the prompt bar."
      - name: "/resume [session]"
        description: "Resume a conversation by ID or name, or open the session picker. Alias: /continue."
      - name: "/review [PR]"
        description: "Review a pull request locally in your current session."
      - name: "/rewind"
        description: "Rewind the conversation and/or code to a previous point, or summarize from a message. Aliases: /checkpoint, /undo."
      - name: "/run"
        description: "(bundled skill) Launch and drive your project's app to see a change working in the running app."
      - name: "/run-skill-generator"
        description: "(bundled skill) Write a per-project skill teaching /run and /verify how to launch and drive your app."
      - name: "/sandbox"
        description: "Toggle sandbox mode (supported platforms only)."
      - name: "/schedule [description]"
        description: "Create, update, list, or run routines on Anthropic-managed cloud infrastructure. Alias: /routines."
      - name: "/scroll-speed"
        description: "Adjust mouse-wheel scroll speed interactively (fullscreen only)."
      - name: "/security-review"
        description: "Analyze pending changes on the current branch for security vulnerabilities."
      - name: "/setup-bedrock"
        description: "Configure Amazon Bedrock auth, region, and model pins (visible when CLAUDE_CODE_USE_BEDROCK=1)."
      - name: "/setup-vertex"
        description: "Configure Google Vertex AI auth, project, region, and model pins (visible when CLAUDE_CODE_USE_VERTEX=1)."
      - name: "/simplify [target]"
        description: "(bundled skill) Review changed code for cleanup opportunities and apply fixes; does not hunt for bugs (use /code-review for that)."
      - name: "/skills"
        description: "List available skills."
      - name: "/stats"
        description: "Alias for /usage (opens on the Stats tab)."
      - name: "/status"
        description: "Open the Settings interface (Status tab): version, model, account, connectivity."
      - name: "/statusline"
        description: "Configure Claude Code's status line."
      - name: "/stickers"
        description: "Order Claude Code stickers."
      - name: "/stop"
        description: "Stop the current background session (only while attached; transcript and worktree are kept)."
      - name: "/tasks"
        description: "List and manage background tasks. Also available as /bashes."
      - name: "/team-onboarding"
        description: "Generate a team onboarding guide from your Claude Code usage history."
      - name: "/teleport"
        description: "Pull a Claude Code on the web session into this terminal. Also /tp."
      - name: "/terminal-setup"
        description: "Configure terminal keybindings for Shift+Enter and other shortcuts."
      - name: "/theme"
        description: "Change the color theme (auto/light/dark, daltonized, ANSI, and custom themes)."
      - name: "/tui [default|fullscreen]"
        description: "Set the terminal UI renderer and relaunch into it with your conversation intact."
      - name: "/ultraplan <prompt>"
        description: "Draft a plan in an ultraplan session, review it in your browser, then execute remotely or send it back to your terminal."
      - name: "/ultrareview [PR]"
        description: "Run a deep multi-agent cloud code review; the preferred invocation is now /code-review ultra."
      - name: "/upgrade"
        description: "Open the upgrade page to switch to a higher plan tier."
      - name: "/usage"
        description: "Show session cost, plan usage limits, and activity stats. Aliases: /cost, /stats."
      - name: "/usage-credits"
        description: "Configure usage credits to keep working when you hit a limit (was /extra-usage)."
      - name: "/verify"
        description: "(bundled skill) Confirm a code change does what it should by building, running, and observing your app."
      - name: "/voice [hold|tap|off]"
        description: "Toggle voice dictation, or enable it in a specific mode (requires a Claude.ai account)."
      - name: "/web-setup"
        description: "Connect your GitHub account to Claude Code on the web using your local gh credentials."
      - name: "/workflows"
        description: "Open the workflow progress view to watch, pause, resume, or save workflows."

  - title: "Output styles"
    provenance: "https://code.claude.com/docs/en/output-styles (retrieved 2026-05-31)"
    note: >-
      Output styles modify Claude Code's system prompt (role, tone, output format). Select one via
      `/config` → Output style; the choice persists as the `outputStyle` setting in
      .claude/settings.local.json, and takes effect after /clear or a new session. The standalone
      `/output-style` command was deprecated in v2.1.73 and removed in v2.1.91. Custom styles can
      be authored as Markdown files under ~/.claude/output-styles, .claude/output-styles, or a
      managed-settings directory.
    entries:
      - name: "Default"
        description: "Claude Code's standard system prompt, designed to complete software-engineering tasks efficiently."
      - name: "Proactive"
        description: "Executes immediately, makes reasonable assumptions instead of pausing for routine decisions, and prefers action over planning (you still see permission prompts)."
      - name: "Explanatory"
        description: "Adds educational \"Insights\" between steps to explain implementation choices and codebase patterns."
      - name: "Learning"
        description: "Collaborative learn-by-doing: shares \"Insights\" and adds TODO(human) markers for you to implement small pieces of code yourself."
